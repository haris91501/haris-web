<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class</title>
    <style>
        .container{
            display: flex;
            height: 300px;
            width: 300px;
            background-color: yellowgreen;
        }  
        .child1{
            height: 100px;
            width: 100px;
            background-color: yellow;
        }
        .child2{
            height: 150px;
            width: 150px;
            background-color: turquoise;
        }
        .child3{
            height: 50px;
            width: 50px;
            background-color: tomato;
        }
        @media only screen and {
            .child2{
            height: 120px;
            width: 50px;
            background-color: rgb(224, 64, 64);
        }
        .child3{
            height: 250px;
            width: 150px;
            background-color: tomato;
        }
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="child1">1</div>
    <div class="child2">2</div>
    <div class="child3">3</div>
</div>
</body>
</html>
